<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario Talleres</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="bg-slate-100">

<header class="bg-dark text-white shadow">
  <div class="container py-4">
      <h1 class="h3 fw-bold">Inventario de Herramientas</h1>
      <p class="mb-0 text-light">Sistema de Gestión de Talleres</p>
  </div>
</header>

<main class="container py-4">

  <div class="card shadow-sm border-0 rounded-4 mb-4">
      <div class="card-body">

          <div class="row g-3">

              <div class="col-md-8">
                  <input type="text"
                         id="searchInput"
                         class="form-control form-control-lg"
                         placeholder="Buscar herramienta...">
              </div>

              <div class="col-md-4">
                  <select id="workshopFilter" class="form-select form-select-lg">
                      <option value="Todos">Todos los talleres</option>
                      <option value="Transmisiones">Transmisiones</option>
                      <option value="Motores">Motores</option>
                      <option value="Pintura">Pintura</option>
                      <option value="Carroceria">Carrocería</option>
                      <option value="Electricidad">Electricidad</option>
                  </select>
              </div>

          </div>

      </div>
  </div>

  <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body">

          <div class="table-responsive">

              <table class="table table-hover align-middle">
                  <thead class="table-dark">
                      <tr>
                          <th>Taller</th>
                          <th>Cantidad</th>
                          <th>Producto</th>
                          <th>Estado</th>
                          <th>Ubicación</th>
                          <th>Fecha Alta</th>
                          <th>Observación</th>
                      </tr>
                  </thead>

                  <tbody id="toolsTableBody"></tbody>

              </table>

          </div>

      </div>
  </div>

</main>

<script src="assets/js/app.js"></script>

</body>
</html>
