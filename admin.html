<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="bg-slate-200 d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg border-0 rounded-4 p-4 login-card">

    <h2 class="text-center mb-4 fw-bold">Acceso Administrador</h2>

    <input type="text" id="username" class="form-control mb-3" placeholder="Usuario">

    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <button class="btn btn-primary w-100" onclick="login()">
        Entrar
    </button>

</div>

<script>

function login(){

    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if(user === 'admin' && pass === '1234'){

        window.location.href = 'Yl2AsOL2n79VCS7K1HzHnD2rj.html';

    }else{

        window.location.href = 'index.html';

    }

}

</script>

</body>
</html>
