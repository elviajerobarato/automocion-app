<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard ERP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="bg-slate-100">

<header class="bg-dark text-white py-4 shadow">
    <div class="container">
        <h1 class="h3 fw-bold">Panel Administrador ERP</h1>
    </div>
</header>

<main class="container py-5">

    <div class="card shadow border-0 rounded-4">

        <div class="card-body">

            <div class="row g-4">

                <div class="col-md-6">

                    <label class="form-label fw-bold">Seleccionar Taller</label>

                    <select id="tallerSelect" class="form-select">
                        <option value="Transmisiones">Transmisiones</option>
                        <option value="Motores">Motores</option>
                        <option value="Pintura">Pintura</option>
                        <option value="Carroceria">Carrocería</option>
                        <option value="Electricidad">Electricidad</option>
                    </select>

                </div>

                <div class="col-md-6">

                    <label class="form-label fw-bold">Subir Excel (.xls o .xlsx)</label>

                    <input type="file"
                           id="excelFile"
                           class="form-control"
                           accept=".xls,.xlsx">

                    <small class="text-muted">
                        Ejemplo: INV_HER_MAQ_T3.xlsx
                    </small>

                </div>

            </div>

            <div class="mt-4">
                <button class="btn btn-success" onclick="procesarExcel()">
                    Procesar Archivo Excel
                </button>
            </div>

            <div class="mt-5">

                <h4 class="fw-bold mb-3">Resultado Comparación</h4>

                <div id="resultados" class="alert alert-secondary">
                    Esperando archivo...
                </div>

            </div>

        </div>

    </div>

</main>

<script>

async function procesarExcel(){

    const fileInput = document.getElementById('excelFile');
    const taller = document.getElementById('tallerSelect').value;

    if(!fileInput.files.length){
        alert('Selecciona un archivo Excel válido');
        return;
    }

    const file = fileInput.files[0];

    const extensionValida =
        file.name.endsWith('.xls') ||
        file.name.endsWith('.xlsx');

    if(!extensionValida){
        alert('Formato no válido');
        return;
    }

    const data = await file.arrayBuffer();

    const workbook = XLSX.read(data);

    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    const json = XLSX.utils.sheet_to_json(sheet);

    const nuevosDatos = json.map(item => ({
        taller: taller,
        cantidad: item['CANTIDAD'] || '',
        producto: item['PRODUCTO'] || '',
        estado: item['ESTADO'] || '',
        ubicacion: item['UBICACIÓN'] || '',
        fechaAlta: item['FECHA ALTA'] || '',
        fechaBaja: item['FECHA BAJA'] || '',
        observacion: item['OBSERVACIÓN'] || ''
    }));

    const response = await fetch('data/herramientas.json');

    const actuales = await response.json();

    const nuevas = nuevosDatos.filter(nuevo =>
        !actuales.some(actual => actual.producto === nuevo.producto)
    );

    const eliminadas = actuales.filter(actual =>
        !nuevosDatos.some(nuevo => nuevo.producto === actual.producto)
    );

    document.getElementById('resultados').innerHTML = `
        <strong>Archivo procesado correctamente</strong><br><br>

        Herramientas nuevas: ${nuevas.length}<br>
        Herramientas eliminadas: ${eliminadas.length}<br><br>

        <strong>Nuevas herramientas:</strong><br>
        ${nuevas.map(h => '- ' + h.producto).join('<br>') || 'Ninguna'}<br><br>

        <strong>Herramientas eliminadas:</strong><br>
        ${eliminadas.map(h => '- ' + h.producto).join('<br>') || 'Ninguna'}
    `;

}

</script>

</body>
</html>
